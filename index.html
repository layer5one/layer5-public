<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Layer5</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#0a0a0a;color:#e0e0e0;
    font-family:'JetBrains Mono',monospace;
    display:flex;align-items:center;justify-content:center;
    height:100vh;flex-direction:column;gap:32px;
    overflow:hidden;
  }

  /* Ambient grid */
  body::before{
    content:'';position:fixed;top:0;left:0;width:100%;height:100%;
    background:
      linear-gradient(rgba(0,255,170,0.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,255,170,0.03) 1px,transparent 1px);
    background-size:40px 40px;
    pointer-events:none;z-index:0;
  }

  h1{
    font-size:32px;letter-spacing:8px;color:#00ffaa;
    text-shadow:0 0 30px rgba(0,255,170,0.3);
    position:relative;z-index:1;
  }

  .subtitle{
    font-size:11px;letter-spacing:4px;color:#555;
    margin-top:-20px;position:relative;z-index:1;
  }

  /* Service grid */
  .services{
    display:flex;flex-direction:column;gap:12px;
    align-items:center;position:relative;z-index:1;
    min-width:280px;
  }

  .section-label{
    font-size:9px;letter-spacing:3px;color:#333;
    text-transform:uppercase;margin-top:8px;
    width:100%;text-align:center;
    border-top:1px solid #1a1a1a;
    padding-top:12px;
  }

  .section-label:first-child{border-top:none;padding-top:0;margin-top:0;}

  a.svc{
    display:flex;align-items:center;gap:10px;
    color:#00ccff;text-decoration:none;
    font-size:13px;letter-spacing:1px;
    padding:10px 20px;width:100%;
    border:1px solid rgba(0,204,255,0.2);
    border-radius:4px;transition:all 0.2s;
    justify-content:center;
  }
  a.svc:hover{background:rgba(0,204,255,0.08);border-color:#00ccff}

  /* Elysia-colored links */
  a.svc.elysia{color:#ff4466;border-color:rgba(255,68,102,0.3)}
  a.svc.elysia:hover{background:rgba(255,68,102,0.08);border-color:#ff4466}

  /* Local service indicators */
  .dot{
    width:7px;height:7px;border-radius:50%;
    display:inline-block;flex-shrink:0;
  }
  .dot.unknown{background:#333}
  .dot.on{background:#00ffaa;box-shadow:0 0 6px rgba(0,255,170,0.6)}
  .dot.off{background:#ff4444;box-shadow:0 0 6px rgba(255,68,68,0.4)}

  .footer{
    font-size:10px;color:#333;letter-spacing:2px;
    position:relative;z-index:1;
  }
</style>
</head>
<body>

<h1>LAYER5</h1>
<div class="subtitle">infrastructure</div>

<div class="services">

  <div class="section-label">public</div>
  <a href="/menagerie/" class="svc">MENAGERIE</a>
  <a href="/skip-trace/" class="svc">SKIP TRACE</a>
  <a href="/hotdog/" class="svc">THE ASCENDED ONE</a>

  <div class="section-label">local services</div>
  <a href="https://elysia.layer5.one" class="svc elysia">
    <span class="dot unknown" id="elysiaDot"></span>
    BLACKWALL DASHBOARD
  </a>
  <a href="https://bridge.layer5.one" class="svc elysia">
    <span class="dot unknown" id="bridgeDot"></span>
    BRIDGE CONTROL
  </a>

</div>

<div class="footer">layer5.one</div>

<script>
// Ping local services to show live/dead status
async function ping(url, dotId) {
  const dot = document.getElementById(dotId);
  if (!dot) return;
  try {
    const r = await fetch(url, {mode:'no-cors',cache:'no-store'});
    // no-cors means we can't read status, but if fetch succeeds the host is up
    dot.className = 'dot on';
  } catch(e) {
    dot.className = 'dot off';
  }
}

// Check local services
ping('https://elysia.layer5.one/health', 'elysiaDot');
ping('https://bridge.layer5.one/health', 'bridgeDot');

// Re-check every 30s
setInterval(() => {
  ping('https://elysia.layer5.one/health', 'elysiaDot');
  ping('https://bridge.layer5.one/health', 'bridgeDot');
}, 30000);
</script>

</body>
</html>
